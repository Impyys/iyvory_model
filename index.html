<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iyvoru Live2D</title>

<style>

html, body{
margin:0;
padding:0;
overflow:hidden;
background:transparent;
}

canvas{
position:absolute;
width:100%;
height:100%;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/browser/pixi.min.js"></script>
<script src="./live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

</head>

<body>

<script>

const app = new PIXI.Application({
resizeTo: window,
backgroundAlpha: 0
});

document.body.appendChild(app.view);

(async function(){

const model = await PIXI.live2d.Live2DModel.from("./iyvoru.model3.json");

model.anchor.set(0.5,0.5);

/* RESPONSIVE SCALE */

let scale;
const screenWidth = window.screen.width;

if(screenWidth < 480){
scale = 0.11;
}
else if(screenWidth < 900){
scale = 0.15;
}
else{
scale = 0.20;
}

model.scale.set(scale);

/* POSITION */

model.x = window.innerWidth / 2;
model.y = window.innerHeight / 2 + 120;

app.stage.addChild(model);


/* SMOOTH MOVEMENT SYSTEM */

let targetX = 0;
let targetY = 0;

let headX = 0;
let headY = 0;

let bodyX = 0;
let bodyY = 0;

const headSmooth = 0.15;
const bodySmooth = 0.07;

app.ticker.add(()=>{

headX += (targetX - headX) * headSmooth;
headY += (targetY - headY) * headSmooth;

bodyX += (headX - bodyX) * bodySmooth;
bodyY += (headY - bodyY) * bodySmooth;

const core = model.internalModel.coreModel;

/* HEAD */

core.setParameterValueById("ParamAngleX", headX * 30);
core.setParameterValueById("ParamAngleY", -headY * 30);

/* BODY */

core.setParameterValueById("ParamBodyAngleX", bodyX * 11);
core.setParameterValueById("ParamBodyAngleY", bodyY * 12.5);

});

/* CURSOR TRACKING */

function moveModel(x,y){

targetX = (x / window.innerWidth - 0.5);
targetY = (y / window.innerHeight - 0.5);

}

window.addEventListener("mousemove", e=>{
moveModel(e.clientX,e.clientY);
});

/* MOBILE TOUCH */

window.addEventListener("touchmove", e=>{
const touch = e.touches[0];
moveModel(touch.clientX,touch.clientY);
});

})();

</script>

</body>

</html>
