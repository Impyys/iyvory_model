<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Iyvoru Live2D</title>

<style>
html, body {
margin:0;
padding:0;
overflow:hidden;
}

canvas{
position:absolute;
width:100%;
height:100%;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/browser/pixi.min.js"></script>
<script src="./live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

</head>

<body>

<script>

const app = new PIXI.Application({
resizeTo: window,
backgroundAlpha: 0
});

document.body.appendChild(app.view);

(async () => {

const model = await PIXI.live2d.Live2DModel.from("./iyvoru.model3.json");

model.anchor.set(0.5,0.5);

/* RESPONSIVE SCALE */

let scale = 0.18;

if(window.innerWidth < 768){
scale = 0.14;
}

if(window.innerWidth < 480){
scale = 0.12;
}

model.scale.set(scale);

/* POSITION */

model.x = window.innerWidth / 2;
model.y = window.innerHeight / 2 + 120;

app.stage.addChild(model);

/* MOUSE TRACKING */

window.addEventListener("mousemove", e => {

const mouseX = (e.clientX / window.innerWidth - 0.5) * 30;
const mouseY = (e.clientY / window.innerHeight - 0.5) * 30;

const core = model.internalModel.coreModel;

core.setParameterValueById("ParamAngleX", mouseX);
core.setParameterValueById("ParamAngleY", -mouseY);

core.setParameterValueById("ParamBodyAngleX", mouseX * 0.3);
core.setParameterValueById("ParamBodyAngleY", mouseY * 0.3);

core.setParameterValueById("ParamBodyAngleZ", mouseX * 0.15);

});

})();

</script>

</body>
</html>
